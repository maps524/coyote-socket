name: Release

on:
  push:
    branches:
      - release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from latest tag
        id: version
        run: |
          $tag = git describe --tags --abbrev=0
          $version = $tag -replace '^v', ''
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version (tag: $tag)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build and rename exe
        run: npm run tauri:build -- --rename

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: CoyoteSocket ${{ steps.version.outputs.tag }}
          body: |
            See the [README](https://github.com/maps524/coyote-socket#readme) for usage instructions.

            ## Download
            Download `CoyoteSocket-${{ steps.version.outputs.version }}.exe` and run it - no installation required.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/CoyoteSocket-${{ steps.version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
