name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v2.2.1)'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --no-bundle

      - name: Get version
        id: version
        run: echo "version=${{ github.event.inputs.tag || github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: CoyoteSocket ${{ steps.version.outputs.version }}
          body: |
            See the [README](https://github.com/maps524/coyote-socket#readme) for usage instructions.

            ## Download
            Download `coyote-socket.exe` and run it - no installation required.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/coyote-socket.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
